# This is the first real CI workflow in the course.
# It verifies a change by running tests on a fresh runner.
name: 02 CI Workflow

env:
  PYTHON_VERSION: 3.12
  AWS_REGION: us-east-1
  ECR_REPOSITORY: github-actions-repo
  IMAGE_TAG: python-v1
on:
  # Run automatically when app code, tests, or this workflow file changes.
  push:
    paths:
      - "app/**"
      - "tests/**"
      - ".github/workflows/02-ci.yml"
  schedule:
    - cron: "0 10 * * *"
  # Allow a safe manual run before students trigger it with a code change.
  workflow_dispatch:

jobs:
  run-tests:
    # The runner is the temporary machine that executes the steps below.


    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        # Download the repository contents onto the runner.
        uses: actions/checkout@v6

      - name: Set up Python
        # Prepare Python on the runner. This does not change the student laptop.
        uses: actions/setup-python@v6

        with:
          python-version: ${{env.PYTHON_VERSION}}

      - name: Scan Doker file
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "config"
          scan-ref: ./Dockerfile
          severity: "HIGH,CRITICAL"
          exit-code: "0" 

      - name: Scan file system
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: '.'
          severity: "HIGH,CRITICAL"
          exit-code: "0"                   

      - name: Run tests
        # This is the key verification step in the CI workflow.
        run: python -m unittest discover -s tests -v

      - name: Validate Python Version
        run: echo python --version


      - name: Linting test
        run: |
          sudo snap install ruff   
          pip install ruff    
          ruff check ./app/app.py


      - name: Build Docker Image
        run: |
          docker build -t python-app:v1 .

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{env.AWS_REGION}}
      
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push Image to ECR
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}          
        run: |
         docker tag python-app:v1 $REGISTRY/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
         docker push $REGISTRY/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
         
      - name: Save Docker Image
        run: |
          docker save -o my-app.tar python-app:v1

      - name: Upload Docker Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: my-app.tar

      - name: Scan Docker Image Archive
        uses: aquasecurity/trivy-action@master
        with:
          input: my-app.tar
          format: table
          severity: HIGH,CRITICAL
          exit-code: "0"
