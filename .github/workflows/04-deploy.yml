name: 04 Deploy Workflow

on:
  pull_request:
    types:
      - closed
    branches:
      - main

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: github-actions-repo
  IMAGE_TAG: python-v1
  CONTAINER_NAME: tiny-health-container
  APP_PORT: "8000"

permissions:
  contents: read

jobs:
  deploy-package:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Pull Docker Image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker pull $REGISTRY/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}

      - name: List Docker Images
        run: docker images

      - name: Start Container
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker run -d \
            --name ${{ env.CONTAINER_NAME }} \
            -p ${{ env.APP_PORT }}:8000 \
            $REGISTRY/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}

      - name: List Running Containers
        run: docker ps

      - name: Smoke Test
        run: |
          for attempt in 1 2 3 4 5; do
            if curl --fail --silent http://127.0.0.1:${APP_PORT}/health; then
              echo "Application is healthy."
              exit 0
            fi
            echo "Waiting for application..."
            sleep 2
          done

          echo "Application failed health check."
          exit 1

      - name: Show Container Logs
        if: failure()
        run: |
          docker logs ${{ env.CONTAINER_NAME }}

      - name: Stop Container
        if: always()
        run: |
          docker rm -f ${{ env.CONTAINER_NAME }} || true